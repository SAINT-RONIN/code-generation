# =============================================
# H2 Database Configuration
# =============================================
spring.datasource.url=${DATASOURCE_URL:jdbc:h2:mem:bankingdb}
spring.datasource.driverClassName=${DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${DATASOURCE_USERNAME:sa}
spring.datasource.password=${DATASOURCE_PASSWORD:}
spring.jpa.database-platform=${JPA_PLATFORM:org.hibernate.dialect.H2Dialect}

# Enable H2 Console (accessible at /h2-console)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# =============================================
# JWT Configuration
# =============================================
jwt.secret=${JWT_SECRET:ZmRnK2FzZGZhc2RmYXNkZmFzZGZhc2RmYXNkZmFzZGZhc2RmYXNkZmFzZGZhc2Rm}
jwt.expiration=${JWT_EXPIRATION:86400000}

# =============================================
# Seed Credentials
# =============================================
seed.employee.email=${SEED_EMPLOYEE_EMAIL:employee@bank.com}
seed.employee.password=${SEED_EMPLOYEE_PASSWORD:employee123}
seed.customer.email=${SEED_CUSTOMER_EMAIL:customer@test.com}
seed.customer.password=${SEED_CUSTOMER_PASSWORD:customer123}
seed.customer2.email=${SEED_CUSTOMER2_EMAIL:customer2@test.com}
seed.customer2.password=${SEED_CUSTOMER2_PASSWORD:customer123}

# =============================================
# CORS
# =============================================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

# =============================================
# Pagination
# =============================================
spring.data.web.pageable.default-page-size=10

# =============================================
# Server Configuration
# =============================================
server.port=${SERVER_PORT:8080}

# =============================================
# Swagger / OpenAPI Configuration
# =============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
