# =============================================
# H2 Database Configuration
# =============================================
spring.datasource.url=jdbc:h2:mem:bankingdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# JWT Configuration
# =============================================
jwt.secret=ZmRnK2FzZGZhc2RmYXNkZmFzZGZhc2RmYXNkZmFzZGZhc2RmYXNkZmFzZGZhc2Rm
jwt.expiration=86400000

# =============================================
# Seed Credentials
# =============================================
seed.employee.email=employee@bank.com
seed.employee.password=employee123
seed.customer.email=customer@test.com
seed.customer.password=customer123

# =============================================
# Server Configuration
# =============================================
server.port=8080

# =============================================
# Swagger / OpenAPI Configuration
# =============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
