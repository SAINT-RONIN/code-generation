<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Overview · Vault</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    /* Vault — default */
    --bg: #FAF7F2;
    --surface: #FFFFFF;
    --surface-2: #F3EFE8;
    --ink: #1A1A1A;
    --ink-2: #4A4A48;
    --ink-3: #8A8A86;
    --line: #E9E3D7;
    --line-2: #DED7C7;
    --accent: #0F3D2E;
    --accent-ink: #F4EFE2;
    --accent-soft: #E5EDE6;
    --credit: #1F6B43;
    --debit: #9B2C2C;
    --warn: #B45309;
  }
  [data-palette="lunar"] {
    --bg: #FFFFFF;
    --surface: #FFFFFF;
    --surface-2: #F4F4F8;
    --ink: #0F172A;
    --ink-2: #334155;
    --ink-3: #94A3B8;
    --line: #E5E7EB;
    --line-2: #D1D5DB;
    --accent: #3730A3;
    --accent-ink: #EEF0FF;
    --accent-soft: #EAEAFB;
    --credit: #166534;
    --debit: #B91C1C;
  }
  [data-palette="atlantic"] {
    --bg: #F7F5F1;
    --surface: #FFFFFF;
    --surface-2: #EFEBE3;
    --ink: #111111;
    --ink-2: #3F3F3D;
    --ink-3: #8B8B85;
    --line: #E6E1D6;
    --line-2: #D6CFBF;
    --accent: #0D5B6B;
    --accent-ink: #EAF3F5;
    --accent-soft: #DCEAEC;
    --credit: #1F6B43;
    --debit: #9B2C2C;
  }

  html, body, #root { height: 100%; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    font-feature-settings: "ss01", "cv11";
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  .font-display { font-family: 'Fraunces', ui-serif, Georgia, serif; font-feature-settings: "ss01"; letter-spacing: -0.02em; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
  .tabnum { font-variant-numeric: tabular-nums; }

  /* Custom focus ring — designed, not browser default */
  *:focus { outline: none; }
  .focusable:focus-visible,
  button:focus-visible,
  a:focus-visible,
  [role="button"]:focus-visible,
  input:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 6px;
  }

  /* nav active dot */
  .nav-item { position: relative; }
  .nav-item[aria-current="page"]::before {
    content: "";
    position: absolute;
    left: -12px; top: 50%;
    width: 3px; height: 16px;
    transform: translateY(-50%);
    background: var(--accent);
    border-radius: 2px;
  }

  /* subtle card hover lift — no layout shift */
  .lift { transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease; }
  .lift:hover { transform: translateY(-1px); }

  /* sparkline draw */
  @keyframes drawline { from { stroke-dashoffset: 1200; } to { stroke-dashoffset: 0; } }
  .spark-path { stroke-dasharray: 1200; animation: drawline 1.4s cubic-bezier(.2,.7,.2,1) .15s both; }
  @keyframes fadeUp { from { opacity:0; transform: translateY(6px);} to { opacity:1; transform: translateY(0);} }
  .fade-up { animation: fadeUp .5s ease both; }
  .delay-1 { animation-delay: .05s; }
  .delay-2 { animation-delay: .12s; }
  .delay-3 { animation-delay: .2s; }
  .delay-4 { animation-delay: .28s; }
  .delay-5 { animation-delay: .36s; }

  /* Account card "credit card" gloss */
  .card-vault {
    background:
      radial-gradient(120% 80% at 0% 0%, rgba(255,255,255,.10), transparent 60%),
      radial-gradient(80% 100% at 100% 100%, rgba(0,0,0,.18), transparent 60%),
      var(--accent);
    color: var(--accent-ink);
  }
  .card-savings {
    background: var(--surface);
    color: var(--ink);
    border: 1px solid var(--line);
  }

  /* scrollbar tone */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 8px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* divider line tone */
  .hairline { border-color: var(--line); }

  /* Quick action tile pattern */
  .qa-tile { background: var(--surface); border: 1px solid var(--line); }
  .qa-tile:hover { border-color: var(--line-2); }

  /* Toast */
  @keyframes toastIn { from { opacity:0; transform: translateY(8px);} to { opacity:1; transform: translateY(0);} }
  .toast { animation: toastIn .25s ease both; }

  /* selection */
  ::selection { background: var(--accent); color: var(--accent-ink); }

  /* Avatar */
  .avatar-ring { box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--line-2); }

  /* pill */
  .pill { background: var(--accent-soft); color: var(--accent); }

  /* row hover */
  .row { transition: background .15s ease; }
  .row:hover { background: var(--surface-2); }

  /* number ticker */
  .ticker-digit { display: inline-block; min-width: 0.6ch; }
</style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="dashboard.jsx"></script>
</body>
</html>
